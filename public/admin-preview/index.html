<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 预览器</title>
    
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <!-- Highlight.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-theme">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部工具栏 -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="app-title">📝 Markdown 预览器</h1>
            </div>
            
            <div class="toolbar-center">
                <!-- 快捷工具栏 -->
                <div class="tool-group">
                    <button class="tool-btn" data-action="heading" title="标题">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 4h2v6h4V4h2v14H9v-6H5v6H3V4m11 0h2v10h4V4h2v14h-2v-4h-6v4h-2V4z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="bold" title="粗体">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M13.5 15.5H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5M10 6.5h3c.83 0 1.5.67 1.5 1.5S13.83 9.5 13 9.5h-3V6.5M15.5 11c1.38 0 2.5-1.12 2.5-2.5S16.88 6 15.5 6H8v12h7.5c1.66 0 3-1.34 3-3s-1.34-3-3-3H10v-1h5.5z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="italic" title="斜体">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4h-8z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="strikethrough" title="删除线">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M17.75 16.5c-.23.48-.57.9-1.02 1.23-.55.41-1.23.73-2.04.95-.81.22-1.74.33-2.79.33-1.38 0-2.55-.21-3.51-.62a5.04 5.04 0 0 1-2.24-1.92c-.51-.84-.77-1.86-.77-3.07H6.1c0 1.54.36 2.81 1.08 3.82.72 1 1.74 1.75 3.06 2.24 1.32.49 2.88.73 4.67.73 1.2 0 2.27-.13 3.21-.4.94-.27 1.73-.66 2.37-1.18.64-.52 1.11-1.15 1.41-1.9l-1.15-.45zM3 12.5h18v-1H3v1zm3.15-3.5c.22-.48.55-.9 1-1.23.54-.41 1.22-.73 2.03-.95.81-.22 1.74-.33 2.79-.33 1.38 0 2.55.21 3.51.62a5.04 5.04 0 0 1 2.24 1.92c.51.84.77 1.86.77 3.07h1.52c0-1.54-.36-2.81-1.08-3.82-.72-1-1.74-1.75-3.06-2.24-1.32-.49-2.88-.73-4.67-.73-1.2 0-2.27.13-3.21.4-.94.27-1.73.66-2.37 1.18-.64.52-1.11 1.15-1.41 1.9l1.15.45z"/></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button class="tool-btn" data-action="link" title="链接">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1M8 13h8v-2H8v2m9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="image" title="图片">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="code" title="代码">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="quote" title="引用">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M6 17h3l2-4V7H5v6h3zm8 0h3l2-4V7h-6v6h3z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="list" title="无序列表">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="ordered-list" title="有序列表">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="task-list" title="任务列表">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM17.99 9l-1.41-1.42-6.59 6.59-2.58-2.57-1.42 1.41 4 3.99z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="table" title="表格">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M5 4h14a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m0 4v4h6V8H5m8 0v4h6V8h-6m-8 6v4h6v-4H5m8 0v4h6v-4h-6z"/></svg>
                    </button>
                    <button class="tool-btn" data-action="formula" title="公式">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M7 2h10v2H7V2M5 4h14v2H5V4M4 6h16v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6m4 2v10h2V8H8m4 0v10h2V8h-2m4 0v10h2V8h-2z"/></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button class="tool-btn" data-action="horizontal-rule" title="水平线">
                        <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 13H5v-2h14v2z"/></svg>
                    </button>
                </div>
            </div>
            
            <div class="toolbar-right">
                <button class="tool-btn tool-btn--text" id="return-publish" title="返回后台发布">返回发布</button>
                <button class="tool-btn" id="theme-toggle" title="切换主题">
                    <svg viewBox="0 0 24 24" width="16" height="16" id="theme-icon"><path fill="currentColor" d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-3.03 0-5.5-2.47-5.5-5.5 0-1.82.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
                </button>
                <button class="tool-btn" id="load-example" title="加载示例">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                </button>
                <button class="tool-btn" id="export-md" title="导出 Markdown">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                </button>
                <span class="tool-btn-group">
                    <button class="tool-btn tool-btn--text tool-btn--active" id="format-blog" title="博客专用 Markdown 格式">博客格式</button>
                    <button class="tool-btn tool-btn--text" id="format-standard" title="转换为标准 Markdown 格式">标准格式</button>
                </span>
                <div class="tool-separator"></div>
                <button class="tool-btn" id="clear" title="清空">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
        </header>

        <!-- 主体区域 -->
        <main class="main-content">
            <!-- 编辑区 -->
            <div class="editor-pane">
                <div class="pane-header">
                    <span class="pane-title">编辑</span>
                    <span class="word-count" id="word-count">0 字</span>
                </div>
                <textarea id="editor" class="editor" placeholder="在此输入 Markdown 代码..."></textarea>
            </div>

            <!-- 预览区 -->
            <div class="preview-pane">
                <div class="pane-header">
                    <div class="pane-header-left">
                        <span class="pane-title" id="preview-title">预览</span>
                        <span class="view-mode-toggle">
                            <button class="view-mode-btn view-mode-btn--active" data-view="preview" title="渲染预览">预览</button>
                            <button class="view-mode-btn" data-view="source" title="查看博客源码">源码</button>
                        </span>
                    </div>
                </div>
                <div id="preview" class="preview markdown-body"></div>
                <textarea id="source-view" class="source-view" readonly placeholder="博客 Markdown 源码"></textarea>
            </div>
        </main>
    </div>

    <div class="gfm-modal" id="gfm-modal" hidden>
        <div class="gfm-modal__backdrop" data-gfm-close></div>
        <div class="gfm-modal__panel" role="dialog" aria-modal="true" aria-labelledby="gfm-modal-title">
            <div class="gfm-modal__header">
                <h2 class="gfm-modal__title" id="gfm-modal-title">标准 Markdown 格式</h2>
                <button class="tool-btn" id="gfm-close" type="button" title="关闭">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
                </button>
            </div>
            <div class="gfm-modal__body">
                <textarea id="gfm-output" class="gfm-output" readonly></textarea>
            </div>
            <div class="gfm-modal__actions">
                <button class="tool-btn tool-btn--text" id="gfm-copy" type="button">复制</button>
                <button class="tool-btn tool-btn--text" id="gfm-apply" type="button">替换编辑器</button>
            </div>
        </div>
    </div>

    <!-- KaTeX JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- Marked.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <!-- DOMPurify -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <script src="js/app.js"></script>
</body>
</html>
